on:
  pull_request_target:
    paths-ignore:
      - ".github/workflows/**"

  pull_request:
    types:
      - closed

concurrency:
  group: ${{ github.workflow }}-pull/${{ github.event.number }}
  cancel-in-progress: true

jobs:
  if_merged:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
    - run: |
        echo The PR was merged
